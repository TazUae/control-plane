# All runtime configuration comes from `.env` (see `.env.example`). Do not add `environment:` here.

services:
  control-plane-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "npx prisma migrate deploy && npm run start:api"
    restart: unless-stopped
    init: true
    env_file:
      - .env
    depends_on:
      control-plane-postgres:
        condition: service_healthy
      control-plane-redis:
        condition: service_healthy
    networks:
      - dokploy-network
      - control-plane-internal
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://127.0.0.1:'+(process.env.PORT||4000)+'/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  control-plane-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "npm run start:worker"
    restart: unless-stopped
    init: true
    env_file:
      - .env
    depends_on:
      control-plane-postgres:
        condition: service_healthy
      control-plane-redis:
        condition: service_healthy
    networks:
      - dokploy-network
      - control-plane-internal

  control-plane-postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - cp_pg_data:/var/lib/postgresql/data
    networks:
      - control-plane-internal
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  control-plane-redis:
    image: redis:7
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
    volumes:
      - cp_redis_data:/data
    networks:
      - control-plane-internal
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cp_pg_data:
  cp_redis_data:

networks:
  dokploy-network:
    external: true
  control-plane-internal:
