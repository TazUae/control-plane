# Production / Dokploy: runtime values come from the host environment (Dokploy project env).
# Do not use env_file here — set every variable below in Dokploy for this stack.
# After changing Dokploy env, redeploy so containers pick up new values.
# Local development: use docker-compose.yml with a gitignored .env (see README).

services:
  control-plane-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "npx prisma migrate deploy && npm run start:api"
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CONTROL_PLANE_API_KEY: ${CONTROL_PLANE_API_KEY}
      PROVISIONING_API_URL: ${PROVISIONING_API_URL}
      PROVISIONING_API_TOKEN: ${PROVISIONING_API_TOKEN}
      PROVISIONING_API_TIMEOUT_MS: ${PROVISIONING_API_TIMEOUT_MS}
      PROVISIONING_VALIDATE_ERP_DB_ON_COMPLETE: ${PROVISIONING_VALIDATE_ERP_DB_ON_COMPLETE}
    depends_on:
      control-plane-postgres:
        condition: service_healthy
      control-plane-redis:
        condition: service_healthy
    networks:
      - control-plane-internal
      - dokploy-network
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('http').get('http://127.0.0.1:'+(process.env.PORT||4000)+'/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  control-plane-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -lc "npm run start:worker"
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CONTROL_PLANE_API_KEY: ${CONTROL_PLANE_API_KEY}
      PROVISIONING_API_URL: ${PROVISIONING_API_URL}
      PROVISIONING_API_TOKEN: ${PROVISIONING_API_TOKEN}
      PROVISIONING_API_TIMEOUT_MS: ${PROVISIONING_API_TIMEOUT_MS}
      PROVISIONING_VALIDATE_ERP_DB_ON_COMPLETE: ${PROVISIONING_VALIDATE_ERP_DB_ON_COMPLETE}
    depends_on:
      control-plane-postgres:
        condition: service_healthy
      control-plane-redis:
        condition: service_healthy
    networks:
      - control-plane-internal
      - dokploy-network

  control-plane-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cp_pg_data:/var/lib/postgresql/data
    networks:
      - control-plane-internal
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  control-plane-redis:
    image: redis:7
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
    volumes:
      - cp_redis_data:/data
    networks:
      - control-plane-internal
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cp_pg_data:
  cp_redis_data:

networks:
  dokploy-network:
    external: true
  control-plane-internal:
