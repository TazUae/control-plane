# Local development: copy `.env.example` to `.env` (gitignored). Override path with ENV_FILE if needed.
# Production / Dokploy: use `docker-compose.dokploy.yml` — Dokploy env is the source of truth (see README).

services:
  erp-execution-service:
    build: .
    ports:
      - "${PORT}:8790"
    env_file:
      - ${ENV_FILE:-.env}
    restart: unless-stopped
