# Production / Dokploy: runtime values come from the host environment (Dokploy project env).
# Do not use env_file here — set every variable below in Dokploy for this service.
# Local development: use docker-compose.yml (or compose.yml) with a gitignored `.env`.

name: erp-execution-service

services:
  erp-execution-service:
    build: .
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      ERP_REMOTE_TOKEN: ${ERP_REMOTE_TOKEN}
      ERP_ADMIN_PASSWORD: ${ERP_ADMIN_PASSWORD}
      ERP_BASE_URL: ${ERP_BASE_URL}
      ERP_COMMAND_TIMEOUT_MS: ${ERP_COMMAND_TIMEOUT_MS}
    expose:
      - "${PORT}"
    networks:
      - dokploy-network
      - axis-erp-internal

networks:
  dokploy-network:
    external: true
  axis-erp-internal:
    name: axiserp-erpnext-pnzjyk_axis-erp-internal
    external: true
