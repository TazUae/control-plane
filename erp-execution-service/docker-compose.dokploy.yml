# Same as docker-compose.yml with external networks. Env vars come from `.env` only.

name: erp-execution-service

services:
  erp-execution-service:
    build: .
    init: true
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${PORT}"
    networks:
      - dokploy-network
      - axis-erp-internal

networks:
  dokploy-network:
    external: true
  axis-erp-internal:
    name: axiserp-erpnext-pnzjyk_axis-erp-internal
    external: true
