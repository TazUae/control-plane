# Dokploy / Docker Compose — erp-execution-service (internal HTTP only; no host port publish).
#
# Prerequisites:
# - Set ERP_BENCH_DOCKER_VOLUME to the SAME Docker volume (or use a bind mount) that backs
#   `/home/frappe/frappe-bench` on your ERPNext backend so `bench` and `sites/` exist.
# - Put ERP_REMOTE_TOKEN / ERP_ADMIN_PASSWORD / ERP_DB_ROOT_PASSWORD in your Dokploy env or a local .env file.
# - Join the same user-defined network(s) as provisioning-agent so ERP_REMOTE_BASE_URL can
#   resolve (e.g. http://erp-execution-service:8790). Do not publish 8790 publicly.
#
# Build context: this directory (erp-execution-service).
#
# Optional: match your ERP image exactly — ERP_RUNTIME_IMAGE=frappe/erpnext:v15.63.0

name: erp-execution-service

services:
  erp-execution-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ERP_RUNTIME_IMAGE: ${ERP_RUNTIME_IMAGE:-frappe/erpnext:v15}
    init: true
    restart: unless-stopped
    working_dir: /home/frappe/frappe-bench
    environment:
      NODE_ENV: production
      PORT: "8790"
      ERP_REMOTE_TOKEN: ${ERP_REMOTE_TOKEN:?set ERP_REMOTE_TOKEN}
      ERP_ADMIN_PASSWORD: ${ERP_ADMIN_PASSWORD:?set ERP_ADMIN_PASSWORD}
      ERP_DB_ROOT_PASSWORD: ${ERP_DB_ROOT_PASSWORD:?set ERP_DB_ROOT_PASSWORD}
      ERP_BENCH_PATH: ${ERP_BENCH_PATH:-/home/frappe/frappe-bench}
      ERP_BENCH_EXECUTABLE: ${ERP_BENCH_EXECUTABLE:-bench}
      ERP_COMMAND_TIMEOUT_MS: ${ERP_COMMAND_TIMEOUT_MS:-120000}
    expose:
      - "8790"
    volumes:
      - ${ERP_BENCH_DOCKER_VOLUME:?set ERP_BENCH_DOCKER_VOLUME to your bench/sites volume name}:/home/frappe/frappe-bench
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
